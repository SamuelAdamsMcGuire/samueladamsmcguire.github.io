<style>
  body { margin: 0; padding: 8px 12px; background: #16213e; font-family: sans-serif; color: #e0e0e0; box-sizing: border-box; }

  .controls > span { font-size: 13px; color: #aaa; line-height: 28px; }
  .ms-wrap { position: relative; display: inline-flex; align-items: center; gap: 6px; }
  .ms-trigger {
    background: #1e2d4a; color: #e0e0e0; border: 1px solid #3a4a6a;
    border-radius: 4px; padding: 4px 10px; font-size: 13px; cursor: pointer; min-width: 130px; text-align: left;
  }
  .ms-trigger:hover { border-color: #00d4aa; }
  .ms-panel {
    display: none; position: absolute; top: calc(100% + 4px); left: 0; z-index: 200;
    background: #1e2d4a; border: 1px solid #3a4a6a; border-radius: 4px;
    padding: 4px 0; min-width: 150px; max-height: 220px; overflow-y: auto;
    box-shadow: 0 4px 14px rgba(0,0,0,0.5);
  }
  .ms-panel.open { display: block; }
  .ms-panel label {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 12px; cursor: pointer; font-size: 13px; white-space: nowrap;
  }
  .ms-panel label:hover { background: rgba(255,255,255,0.06); }
  .ms-panel input[type=checkbox] { accent-color: #00d4aa; cursor: pointer; flex-shrink: 0; }
  .ms-sep { border-top: 1px solid #3a4a6a; margin: 3px 0; }
  .excl-cb { accent-color: #00d4aa; cursor: pointer; width: 13px; height: 13px; }
  .excl-label { font-size: 12px; color: #888; cursor: pointer; user-select: none; }
  .mode-toggle { display: flex; border: 1px solid #3a4a6a; border-radius: 4px; overflow: hidden; }
  .mode-btn {
    background: transparent; color: #e0e0e0; border: none; padding: 4px 14px;
    font-size: 13px; cursor: pointer; transition: background 0.15s;
  }
  .mode-btn:hover { background: rgba(255,255,255,0.08); }
  .mode-btn.active { background: #1e3a5f; color: #00d4aa; font-weight: 600; }
  .model-toggles {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    background: #1a1a2e; border: 1px solid #3a4a6a; border-radius: 4px; padding: 4px 10px;
  }
  .model-toggle-item { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 13px; white-space: nowrap; }
  .model-toggle-item input { cursor: pointer; }
  .model-swatch { display: inline-block; width: 12px; height: 12px; border-radius: 2px; vertical-align: middle; flex-shrink: 0; }
</style>

// ── Multi-select ──────────────────────────────────────────────────────────────
function makeMultiSelect(triggerId, panelId, items, allLabel) {
  const trigger = document.getElementById(triggerId);
  const panel   = document.getElementById(panelId);
  const selected = new Set();

  const allItem = document.createElement('label');
  allItem.innerHTML = '<input type="checkbox" checked> ' + allLabel;
  const allCb = allItem.querySelector('input');
  panel.appendChild(allItem);
  const sep = document.createElement('div'); sep.className = 'ms-sep'; panel.appendChild(sep);

  const cbs = [];
  for (const item of items) {
    const lbl = document.createElement('label');
    lbl.innerHTML = '<input type="checkbox" value="' + item + '"> ' + item;
    const cb = lbl.querySelector('input');
    cb.addEventListener('change', () => {
      if (cb.checked) selected.add(item); else selected.delete(item);
      allCb.checked = selected.size === 0;
      updateTrigger(); updateChart();
    });
    cbs.push(cb);
    panel.appendChild(lbl);
  }
  allCb.addEventListener('change', () => {
    if (allCb.checked) { selected.clear(); cbs.forEach(c => c.checked = false); }
    updateTrigger(); updateChart();
  });

  function updateTrigger() {
    if (selected.size === 0) trigger.textContent = allLabel + ' ▾';
    else if (selected.size <= 2) trigger.textContent = Array.from(selected).join(', ') + ' ▾';
    else trigger.textContent = selected.size + ' selected ▾';
  }
  trigger.addEventListener('click', e => { e.stopPropagation(); panel.classList.toggle('open'); });
  panel.addEventListener('click', e => e.stopPropagation());
  return { getSelected: () => selected };
}

  const cb = item.querySelector('input');

  togglesContainer.appendChild(item);
}

// ── Metric helpers ────────────────────────────────────────────────────────────
function computeErrorByMonth(rows, predKey) {
  const byMonth = {};
  for (const r of rows) {
    const pred = r[predKey];
    if (pred == null || r.actual_kg == null) continue;
    if (!byMonth[r.month_order]) byMonth[r.month_order] = { absErr: 0, actual: 0 };
    byMonth[r.month_order].absErr += Math.abs(pred - r.actual_kg);
    byMonth[r.month_order].actual += r.actual_kg;
  }
  return monthOrders.map(m => {
    const b = byMonth[m];
    if (!b || b.actual === 0) return null;
    return parseFloat((b.absErr / b.actual * 100).toFixed(2));
  });
}

function computeUpliftByMonth(rows, predKey) {
  const byMonth = {};
  for (const r of rows) {
    const val = predKey ? r[predKey] : r.actual_kg;
    if (val == null) continue;
    byMonth[r.month_order] = (byMonth[r.month_order] || 0) + val;
  }
  return monthOrders.map(m =>
    byMonth[m] != null ? parseFloat((byMonth[m] / 1000).toFixed(0)) : null
  );
}

function updateChart() {
  const selAirlines = airlineMs.getSelected();
  const selAirports = airportMs.getSelected();
  const exAirline   = airlineExclude.checked && selAirlines.size > 0;
  const exAirport   = airportExclude.checked && selAirports.size > 0;

  const filtered = allRows.filter(r => {
    const aOk = selAirlines.size === 0 ? true : exAirline ? !selAirlines.has(r.airline) : selAirlines.has(r.airline);
    const pOk = selAirports.size === 0 ? true : exAirport ? !selAirports.has(r.airport) : selAirports.has(r.airport);
    return aOk && pOk;
  });

  function selLabel(sel, excl, plural) {
    if (sel.size === 0) return null;
    const prefix = excl ? 'excl. ' : '';
    if (sel.size <= 2) return prefix + Array.from(sel).join(', ');
    return prefix + sel.size + ' ' + plural;
  }
  const parts = [selLabel(selAirlines, exAirline, 'airlines'), selLabel(selAirports, exAirport, 'airports')].filter(Boolean);
  const subtitle = parts.length > 0 ? parts.join(' · ') : 'All airlines · All airports';

  const baseLayout = {
    barmode: 'group',
    paper_bgcolor: '#16213e',
    plot_bgcolor:  '#1a1a2e',
    font:   { color: '#e0e0e0', size: 13 },
    height: 430,
    margin: { l: 55, r: 20, t: 40, b: 80 },
    xaxis:  { gridcolor: '#2a2a4a', zeroline: false },
    legend: { bgcolor: 'rgba(0,0,0,0.3)', bordercolor: '#2a2a4a', orientation: 'h', y: -0.22 },
    annotations: [{ text: subtitle, x: 0.5, y: 1.06, xref: 'paper', yref: 'paper',
                    showarrow: false, font: { size: 13, color: '#aaa' }, xanchor: 'center' }],
  };

  const activeMods = MODELS.filter(m => modelEnabled[m.key]);
  const traces = [];

  if (mode === 'uplift') {
    traces.push({
      type: 'bar', name: 'Actual', x: monthNames,
      y: computeUpliftByMonth(filtered, null),
      marker: { color: '#4dabf7' },
    });
    for (const m of activeMods) {
      traces.push({
        type: 'bar', name: m.label, x: monthNames,
        y: computeUpliftByMonth(filtered, m.key),
        marker: { color: m.color },
      });
    }
    Plotly.react('chart', traces, { ...baseLayout, yaxis: { title: 'Uplift (t)', gridcolor: '#2a2a4a', zeroline: false } });
    return;
  }

  // Error % mode — compute per-model errors first, then build traces + winner annotations
  const allErrors = {};
  for (const m of activeMods) {
    const errs = computeErrorByMonth(filtered, m.key);
    allErrors[m.key] = errs;
    traces.push({
      type: 'bar', name: m.label, x: monthNames, y: errs,
      marker: { color: m.color },
      text: errs.map(v => v != null ? v.toFixed(1) + '%' : ''),
      textposition: 'outside',
      textfont: { size: 11, color: m.color },
    });
  }

  // Winner annotation per month (best = lowest error)
  const annotations = [...baseLayout.annotations];
  monthOrders.forEach((mo, i) => {
    const vals = activeMods
      .map(m => ({ label: m.label, val: allErrors[m.key][i], color: m.color }))
      .filter(x => x.val != null);
    if (vals.length < 2) return;
    const best = vals.reduce((a, b) => a.val < b.val ? a : b);
    const maxY  = Math.max(...vals.map(x => x.val));
    annotations.push({
      x: monthNames[i], y: maxY + 0.5,
      text: '★ ' + best.label,
      showarrow: false,
      font: { size: 10, color: best.color, family: 'monospace' },
    });
  });

  Plotly.react('chart', traces, {
    ...baseLayout,
    yaxis: { title: 'WAPE (%)', gridcolor: '#2a2a4a', zeroline: false },
    annotations,
  });
}

airlineExclude.addEventListener('change', updateChart);
airportExclude.addEventListener('change', updateChart);
updateChart();
</script>
</body>
